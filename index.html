<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Break-Even Kalkulačka · Podnikání Kristýna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', Arial, sans-serif; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    input[type=range] { height: 6px; }
    input:focus { outline: none; }
    button:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const PLP_BLUE   = "#0033A0";
    const RED_ACCENT = "#E4002B";
    const LIGHT_BG   = "#E7F5F9";
    const CARD_BG    = "#ffffff";
    const BORDER     = "#e0e0e0";
    const DARK_GRAY  = "#333333";
    const MID_GRAY   = "#888888";

    const fmt = (n) => Math.round(n).toLocaleString("cs-CZ") + " Kč";

    const SectionLabel = ({ num, text }) => (
      <div style={{ display: "flex", alignItems: "center", gap: "10px",
        marginBottom: "20px", paddingBottom: "12px",
        borderBottom: `2px solid ${RED_ACCENT}` }}>
        <span style={{ color: RED_ACCENT, fontWeight: "700", fontSize: "13px",
          letterSpacing: "2px", fontFamily: "monospace" }}>
          {String(num).padStart(2, "0")} —
        </span>
        <span style={{ color: PLP_BLUE, fontWeight: "700", fontSize: "13px",
          letterSpacing: "2px", textTransform: "uppercase", fontFamily: "monospace" }}>
          {text}
        </span>
      </div>
    );

    const Slider = ({ label, value, min, max, step, onChange, format }) => (
      <div style={{ marginBottom: "18px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
          <span style={{ fontSize: "11px", fontWeight: "700", color: DARK_GRAY, textTransform: "uppercase", letterSpacing: "1px" }}>{label}</span>
          <span style={{ fontSize: "12px", fontWeight: "900", color: PLP_BLUE, fontFamily: "monospace" }}>{format(value)}</span>
        </div>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e => onChange(Number(e.target.value))}
          style={{ width: "100%", accentColor: PLP_BLUE, cursor: "pointer" }} />
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: "2px" }}>
          <span style={{ fontSize: "10px", color: MID_GRAY, fontFamily: "monospace" }}>{format(min)}</span>
          <span style={{ fontSize: "10px", color: MID_GRAY, fontFamily: "monospace" }}>{format(max)}</span>
        </div>
      </div>
    );

    function App() {
      const [fixedCosts, setFixedCosts] = useState(15650);
      const [salaryCount, setSalaryCount] = useState(3);
      const [salaryGross, setSalaryGross] = useState(30000);
      const [varCost, setVarCost] = useState(7500);
      const [price, setPrice] = useState(15000);
      const [targetWorkshops, setTargetWorkshops] = useState(20);

      const employerMultiplier = 1.338;

      const totalSalaryCost = salaryCount * salaryGross * employerMultiplier;
      const totalFixed = fixedCosts + totalSalaryCost;
      const contribution = price - varCost;
      const breakEven = contribution > 0 ? totalFixed / contribution : Infinity;
      const breakEvenCeil = Math.ceil(breakEven);
      const revenue = targetWorkshops * price;
      const totalVarCosts = targetWorkshops * varCost;
      const totalCosts = totalFixed + totalVarCosts;
      const profit = revenue - totalCosts;
      const margin = revenue > 0 ? (profit / revenue) * 100 : 0;

      const perWeek = (breakEvenCeil / 4.33).toFixed(1).replace(".", ",");

      const barMax = Math.max(totalFixed + totalVarCosts * 2, revenue * 1.1);
      const revenueBar = Math.min((revenue / barMax) * 100, 100);
      const costsBar = Math.min((totalCosts / barMax) * 100, 100);

      return (
        <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "'Barlow', Arial, sans-serif" }}>
          {/* Navbar */}
          <div style={{ background: PLP_BLUE, padding: "0 32px", display: "flex",
            alignItems: "center", justifyContent: "space-between", height: "52px",
            borderBottom: "3px solid rgba(255,255,255,0.3)" }}>
            <h1 style={{ margin: 0, fontSize: "20px", fontWeight: "900", color: "white",
              letterSpacing: "-0.5px", textTransform: "uppercase" }}>
              BREAK-EVEN POINT <span style={{ color: "white", opacity: 0.75 }}>KALKULAČKA</span>
            </h1>
            <div style={{ border: "1.5px solid rgba(255,255,255,0.5)", padding: "4px 10px",
              color: "white", fontSize: "10px", fontWeight: "700",
              letterSpacing: "2px", fontFamily: "monospace" }}>
              Podnikání Kristýna
            </div>
          </div>

          <div style={{ maxWidth: "960px", margin: "0 auto", padding: "32px 24px 60px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px" }}>

              {/* LEFT: Inputs */}
              <div>
                {/* Fixed costs */}
                <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, padding: "24px", marginBottom: "20px" }}>
                  <SectionLabel num={1} text="Fixní náklady" />
                  <Slider label="Ostatní fixní náklady / měs." value={fixedCosts} min={0} max={50000} step={500}
                    onChange={setFixedCosts} format={fmt} />
                  <Slider label="Počet zaměstnanců / zakladatelek" value={salaryCount} min={0} max={6} step={1}
                    onChange={setSalaryCount} format={v => v + " os."} />
                  <Slider label="Hrubá mzda (1 osoba)" value={salaryGross} min={0} max={80000} step={1000}
                    onChange={setSalaryGross} format={fmt} />
                  <div style={{ background: LIGHT_BG, padding: "12px 14px", borderLeft: `3px solid ${RED_ACCENT}`, marginTop: "8px" }}>
                    <div style={{ fontSize: "10px", color: MID_GRAY, fontFamily: "monospace", marginBottom: "4px", letterSpacing: "1px" }}>CELKOVÉ MZDOVÉ NÁKLADY (VČETNĚ ODVODŮ 33,8 %)</div>
                    <div style={{ fontSize: "14px", fontWeight: "900", color: PLP_BLUE }}>{fmt(totalSalaryCost)}</div>
                  </div>
                </div>

                {/* Variable + pricing */}
                <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, padding: "24px" }}>
                  <SectionLabel num={2} text="Workshop" />
                  <Slider label="Variabilní náklady / workshop" value={varCost} min={1000} max={20000} step={500}
                    onChange={setVarCost} format={fmt} />
                  <Slider label="Průměrná cena workshopu" value={price} min={5000} max={50000} step={500}
                    onChange={setPrice} format={fmt} />
                  <div style={{ background: LIGHT_BG, padding: "12px 14px", borderLeft: `3px solid ${contribution > 0 ? PLP_BLUE : RED_ACCENT}`, marginTop: "8px" }}>
                    <div style={{ fontSize: "10px", color: MID_GRAY, fontFamily: "monospace", marginBottom: "4px", letterSpacing: "1px" }}>PŘÍSPĚVEK NA KRYTÍ (1 WORKSHOP)</div>
                    <div style={{ fontSize: "14px", fontWeight: "900", color: contribution > 0 ? PLP_BLUE : RED_ACCENT }}>{fmt(contribution)}</div>
                  </div>
                </div>
              </div>

              {/* RIGHT: Results */}
              <div>
                {/* Break-even result */}
                <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`,
                  borderTop: `3px solid ${RED_ACCENT}`, marginBottom: "20px", animation: "fadeUp 0.35s ease" }}>
                  <div style={{ background: PLP_BLUE, padding: "12px 20px" }}>
                    <span style={{ color: RED_ACCENT, fontWeight: "900", fontSize: "11px",
                      letterSpacing: "2px", fontFamily: "monospace" }}>
                      ◎ BREAK-EVEN POINT
                    </span>
                  </div>
                  <div style={{ padding: "28px", textAlign: "center" }}>
                    <div style={{ fontSize: "11px", color: MID_GRAY, fontFamily: "monospace", letterSpacing: "2px", marginBottom: "8px" }}>MINIMUM WORKSHOPŮ / MĚS.</div>
                    <div style={{ fontSize: "64px", fontWeight: "900", color: contribution > 0 ? PLP_BLUE : RED_ACCENT, lineHeight: 1 }}>
                      {contribution > 0 ? breakEvenCeil : "∞"}
                    </div>
                    {contribution > 0 && (
                      <>
                        <div style={{ fontSize: "13px", color: MID_GRAY, marginTop: "8px" }}>
                          ≈ <strong style={{ color: DARK_GRAY }}>{perWeek}</strong> workshopů / týden
                        </div>
                      </>
                    )}
                  </div>
                </div>

                {/* Scenario simulator */}
                <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, padding: "24px", animation: "fadeUp 0.35s ease" }}>
                  <SectionLabel num={3} text="Scénář" />
                  <Slider label="Počet workshopů / měsíc" value={targetWorkshops} min={1} max={60} step={1}
                    onChange={setTargetWorkshops} format={v => v + " ws"} />

                  {/* Bar chart */}
                  <div style={{ marginBottom: "20px" }}>
                    <div style={{ marginBottom: "8px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "4px" }}>
                        <span style={{ fontSize: "10px", fontFamily: "monospace", color: MID_GRAY, letterSpacing: "1px" }}>TRŽBY</span>
                        <span style={{ fontSize: "11px", fontWeight: "700", color: "#2e7d32" }}>{fmt(revenue)}</span>
                      </div>
                      <div style={{ height: "16px", background: LIGHT_BG, border: `1px solid ${BORDER}` }}>
                        <div style={{ height: "100%", width: `${revenueBar}%`, background: "#2e7d32", transition: "width 0.3s" }} />
                      </div>
                    </div>
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "4px" }}>
                        <span style={{ fontSize: "10px", fontFamily: "monospace", color: MID_GRAY, letterSpacing: "1px" }}>CELKOVÉ NÁKLADY</span>
                        <span style={{ fontSize: "11px", fontWeight: "700", color: RED_ACCENT }}>{fmt(totalCosts)}</span>
                      </div>
                      <div style={{ height: "16px", background: LIGHT_BG, border: `1px solid ${BORDER}` }}>
                        <div style={{ height: "100%", width: `${costsBar}%`, background: RED_ACCENT, transition: "width 0.3s" }} />
                      </div>
                    </div>
                  </div>

                  {/* P&L summary */}
                  <div style={{
                    background: profit >= 0 ? "#e8f5e9" : "#ffebee",
                    border: `2px solid ${profit >= 0 ? "#2e7d32" : RED_ACCENT}`,
                    padding: "16px", textAlign: "center"
                  }}>
                    <div style={{ fontSize: "10px", fontFamily: "monospace", letterSpacing: "2px", color: MID_GRAY, marginBottom: "6px" }}>
                      {profit >= 0 ? "✓ ZISK / MĚS." : "✗ ZTRÁTA / MĚS."}
                    </div>
                    <div style={{ fontSize: "28px", fontWeight: "900", color: profit >= 0 ? "#2e7d32" : RED_ACCENT }}>
                      {profit >= 0 ? "+" : ""}{fmt(profit)}
                    </div>
                    <div style={{ fontSize: "11px", color: MID_GRAY, marginTop: "4px" }}>
                      Marže: <strong style={{ color: profit >= 0 ? "#2e7d32" : RED_ACCENT }}>{margin.toFixed(1).replace(".", ",")} %</strong>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Cost breakdown table */}
            <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, marginTop: "20px", animation: "fadeUp 0.35s ease" }}>
              <div style={{ background: PLP_BLUE, padding: "12px 20px" }}>
                <span style={{ color: RED_ACCENT, fontWeight: "900", fontSize: "11px", letterSpacing: "2px", fontFamily: "monospace" }}>
                  ≡ PŘEHLED NÁKLADŮ
                </span>
              </div>
              <div style={{ padding: "20px" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
                  <thead>
                    <tr style={{ borderBottom: `2px solid ${PLP_BLUE}` }}>
                      {["Položka", "Typ", "Měsíčně"].map(h => (
                        <th key={h} style={{ textAlign: "left", padding: "8px 12px", fontWeight: "700",
                          textTransform: "uppercase", letterSpacing: "1px", color: PLP_BLUE, fontSize: "10px", fontFamily: "monospace" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      ["Ostatní fixní náklady", "FIX", fixedCosts],
                      [`Mzdy (${salaryCount}× ${fmt(salaryGross)} hrubého) + odvody 33,8 %`, "FIX", totalSalaryCost],
                      [`Variabilní náklady (${targetWorkshops} workshopů × ${fmt(varCost)})`, "VAR", totalVarCosts],
                    ].map(([name, type, val], i) => (
                      <tr key={i} style={{ borderBottom: `1px solid ${BORDER}`, background: i % 2 === 0 ? LIGHT_BG : CARD_BG }}>
                        <td style={{ padding: "10px 12px", color: DARK_GRAY }}>{name}</td>
                        <td style={{ padding: "10px 12px" }}>
                          <span style={{ background: type === "FIX" ? PLP_BLUE : RED_ACCENT, color: "white",
                            fontSize: "10px", fontWeight: "700", padding: "2px 8px", fontFamily: "monospace", letterSpacing: "1px" }}>
                            {type}
                          </span>
                        </td>
                        <td style={{ padding: "10px 12px", fontWeight: "700", color: DARK_GRAY, fontFamily: "monospace" }}>{fmt(val)}</td>
                      </tr>
                    ))}
                    <tr style={{ borderTop: `2px solid ${PLP_BLUE}`, background: LIGHT_BG }}>
                      <td style={{ padding: "10px 12px", fontWeight: "900", color: PLP_BLUE, textTransform: "uppercase", letterSpacing: "1px" }}>CELKEM</td>
                      <td />
                      <td style={{ padding: "10px 12px", fontWeight: "900", color: PLP_BLUE, fontFamily: "monospace", fontSize: "13px" }}>{fmt(totalCosts)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
